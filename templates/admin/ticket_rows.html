{% for ticket in tickets %}
<tr class="hover:bg-gray-50 dark:hover:bg-gray-700" id="ticket-row-{{ ticket.id }}">
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white">
        {{ ticket.ticket_number }}
    </td>
    <td class="px-6 py-4 text-sm text-gray-700 dark:text-gray-300">
        {{ ticket.title }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm status-cell" id="status-{{ ticket.id }}">
        {{ ticket.get_status_display }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm">
        <select hx-post="{% url 'admin_inline_ticket_status' ticket.id %}"
                hx-target="#status-{{ ticket.id }}"
                hx-swap="outerHTML"
                class="border rounded-md px-2 py-1 text-sm bg-white dark:bg-gray-700">
            <option value="open" {% if ticket.status == 'open' %}selected{% endif %}>Open</option>
            <option value="assigned" {% if ticket.status == 'assigned' %}selected{% endif %}>Assigned</option>
            <option value="in_progress" {% if ticket.status == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="resolved" {% if ticket.status == 'resolved' %}selected{% endif %}>Resolved</option>
            <option value="closed" {% if ticket.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="4" class="px-6 py-8 text-center text-gray-500">No tickets found.</td>
</tr>
{% endfor %}
