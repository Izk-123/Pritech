{% extends "base.html" %}
{% block title %}Two‑Factor Authentication{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card mt-5">
      <div class="card-header">Verify your identity</div>
      <div class="card-body">
        <p>Enter the 6‑digit code from your authenticator app.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <input type="text" name="token" class="form-control" placeholder="123456" maxlength="6" autofocus required autocomplete="off">
          </div>
          <button type="submit" class="btn btn-primary w-100">Verify</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
