{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login — Pritech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/mobile-first.css' %}">
  <style> body { background: var(--bg-secondary); } .login-card { max-width: 420px; border-radius: 20px; } </style>
</head>
<body class="d-flex align-items-center min-vh-100 p-3">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card login-card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex justify-content-end mb-2">
            <button class="theme-toggle-btn" id="themeToggle" type="button">
              <i class="bi bi-sun-fill light-icon"></i>
              <i class="bi bi-moon-stars-fill dark-icon"></i>
            </button>
          </div>
          <div class="text-center mb-4">
            <div class="brand-icon mx-auto mb-3" style="width: 48px; height: 48px;">
              <span class="fw-bold fs-5">PT</span>
            </div>
            <h2 class="fw-bold" style="color: var(--text-primary);">Welcome back</h2>
            <p style="color: var(--text-muted);">Sign in to your account</p>
          </div>
          {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}
          {% if messages %}
            {% for m in messages %}
              <div class="alert alert-{{ m.tags }}">{{ m }}</div>
            {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold" style="color: var(--text-primary);">Email address</label>
              <input type="email" name="username" class="form-control form-control-lg" placeholder="you@example.com" autofocus required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="color: var(--text-primary);">Password</label>
              <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign in</button>
          </form>
          <p class="text-center mt-4 mb-0" style="color: var(--text-muted);">
            New client? <a href="{% url 'register' %}" class="fw-semibold" style="color: var(--primary);">Create account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  function setTheme(theme) {
    html.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    document.querySelector('.light-icon').style.display = theme === 'dark' ? 'none' : 'inline-block';
    document.querySelector('.dark-icon').style.display = theme === 'dark' ? 'inline-block' : 'none';
  }
  const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setTheme(savedTheme);
  themeToggle?.addEventListener('click', () => setTheme(html.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));
</script>
</body>
</html>
