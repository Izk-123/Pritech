{% extends "base.html" %}
{% block title %}Change Subscription Plan{% endblock %}
{% block page_title %}Change Plan{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">Select New Plan</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Confirm Change</button>
          <a href="{% url 'client_subscription_detail' %}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
