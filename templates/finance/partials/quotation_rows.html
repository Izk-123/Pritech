{% load static %}
{% for q in quotations %}
<tr class="stagger-item">
  <td class="q-num">
    <a href="{% url 'quotation_detail' q.pk %}">{{ q.quotation_number }}</a>
  </td>
  <td style="font-size:0.88rem; color:var(--text-secondary);">{{ q.client.name }}</td>
  <td style="font-size:0.82rem; color:var(--text-muted);">{{ q.issue_date }}</td>
  <td style="font-size:0.82rem;" class="{% if q.valid_until < today %}q-expired{% endif %}">{{ q.valid_until }}</td>
  <td style="text-align:right;" class="q-amount">{{ site_config.currency_symbol }}{{ q.total_amount|floatformat:0 }}</td>
  <td>
    <select class="status-select"
            data-url="{% url 'update_quotation_status' q.pk %}">
      {% for val, label in q.STATUS_CHOICES %}
        <option value="{{ val }}" {% if q.status == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </td>
  <td class="q-actions">
    <a href="{% url 'quotation_detail' q.pk %}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-eye"></i>
    </a>
  </td>
</tr>
{% empty %}
<tr>
  <td colspan="7">
    <div class="q-empty">
      <i class="bi bi-file-earmark-text q-empty-icon"></i>
      <div class="q-empty-title">No quotations found</div>
      <div style="font-size:0.82rem;">Try adjusting your search filter.</div>
    </div>
  </td>
</tr>
{% endfor %}
